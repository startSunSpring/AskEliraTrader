<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AskElira Pipeline Dashboard</title>

  <!-- vis-network for node graph -->
  <script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <link  href="https://unpkg.com/vis-network@9.1.9/dist/dist/vis-network.min.css" rel="stylesheet" />

  <style>
    /* ── Reset + tokens ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d14;
      --surface:   #14141f;
      --border:    #2a2a40;
      --cyan:      #00d4ff;
      --yellow:    #f5a623;
      --green:     #27ae60;
      --red:       #e74c3c;
      --magenta:   #9b59b6;
      --dim:       #555577;
      --text:      #ccccdd;
      --text-dim:  #666688;
      --radius:    8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
    }

    /* ── App shell ──────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: 54px 1fr 180px;
      grid-template-columns: 1fr 300px;
      grid-template-areas:
        "header  header"
        "graph   sidebar"
        "log     log";
      height: 100vh;
      gap: 0;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    #header {
      grid-area: header;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    #header-left { display: flex; align-items: center; gap: 12px; }
    #header-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.05em;
    }
    #pipeline-name { color: var(--text); font-weight: 400; }
    #live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--dim);
      transition: background 0.3s;
    }
    #live-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    #live-dot.error { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    #header-right { display: flex; align-items: center; gap: 16px; }
    .header-badge {
      font-size: 11px; color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 8px;
    }
    #active-label { color: var(--yellow); font-size: 12px; }

    /* ── Graph area ──────────────────────────────────────────────── */
    #graph-area {
      grid-area: graph;
      position: relative;
      overflow: hidden;
    }
    #network {
      width: 100%; height: 100%;
      background: var(--bg);
    }

    /* MiroFish overlay badge */
    #mirofish-badge {
      display: none;
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(155, 89, 182, 0.15);
      border: 1px solid var(--magenta);
      border-radius: var(--radius);
      padding: 8px 16px;
      font-size: 11px;
      color: var(--magenta);
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
    #mirofish-badge.visible { display: block; }
    #mirofish-phase { font-weight: 700; margin-bottom: 2px; }
    #mirofish-progress-bar {
      width: 200px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    #mirofish-progress-fill {
      height: 100%; background: var(--magenta);
      transition: width 0.4s ease;
      border-radius: 2px;
    }

    /* Node detail tooltip */
    #node-detail {
      display: none;
      position: absolute;
      top: 16px; right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      min-width: 200px; max-width: 280px;
      font-size: 11px;
      z-index: 10;
    }
    #node-detail.visible { display: block; }
    #node-detail h3 { color: var(--cyan); margin-bottom: 8px; font-size: 13px; }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .detail-key { color: var(--text-dim); }
    .detail-val { color: var(--text); font-weight: 600; }
    #node-detail-close {
      position: absolute; top: 8px; right: 10px;
      cursor: pointer; color: var(--dim); font-size: 16px;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }

    .sidebar-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-section:last-child { border-bottom: none; flex: 1; overflow-y: auto; }
    .section-title {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    /* Metrics */
    .metric-row {
      display: flex; justify-content: space-between;
      margin-bottom: 6px; align-items: center;
    }
    .metric-label { color: var(--text-dim); font-size: 11px; }
    .metric-value { color: var(--text); font-weight: 700; font-size: 13px; font-variant-numeric: tabular-nums; }
    .metric-value.green  { color: var(--green); }
    .metric-value.yellow { color: var(--yellow); }
    .metric-value.red    { color: var(--red); }

    /* Agent list */
    .agent-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: opacity 0.15s;
    }
    .agent-item:last-child { border-bottom: none; }
    .agent-item:hover { opacity: 0.8; }
    .agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .agent-name { font-weight: 600; flex: 1; }
    .agent-role { color: var(--text-dim); font-size: 10px; }
    .agent-status-icon { font-size: 11px; }
    .agent-progress-wrap { width: 100%; }
    .agent-progress-bar {
      height: 2px; background: var(--border);
      border-radius: 1px; margin-top: 2px; overflow: hidden;
    }
    .agent-progress-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }

    /* ── Log area ────────────────────────────────────────────────── */
    #log-area {
      grid-area: log;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #log-header {
      padding: 6px 16px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    #log-clear { cursor: pointer; color: var(--dim); font-size: 10px; }
    #log-clear:hover { color: var(--text); }
    #log-entries {
      flex: 1; overflow-y: auto; padding: 6px 16px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .log-entry {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 11px; padding: 2px 0;
      border-bottom: 1px solid rgba(42,42,64,0.5);
    }
    .log-ts { color: var(--text-dim); flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .log-event { flex-shrink: 0; font-weight: 700; min-width: 130px; }
    .log-msg { color: var(--text-dim); }
    .log-event.start    { color: var(--yellow); }
    .log-event.complete { color: var(--green); }
    .log-event.error    { color: var(--red); }
    .log-event.mirofish { color: var(--magenta); }
    .log-event.default  { color: var(--cyan); }

    /* ── Scrollbar ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <div id="header-left">
      <div id="live-dot"></div>
      <span id="header-title">ASKELIRA PIPELINE</span>
      <span style="color:var(--dim)"> — </span>
      <span id="pipeline-name">Loading…</span>
    </div>
    <div id="header-right">
      <span id="active-label"></span>
      <span class="header-badge" id="elapsed-badge">00:00:00</span>
      <span class="header-badge" id="steps-badge">0 / ?</span>
      <span class="header-badge" id="cost-badge">$0.0000</span>
    </div>
  </header>

  <!-- Graph (vis.js) -->
  <main id="graph-area">
    <div id="network"></div>

    <!-- MiroFish overlay -->
    <div id="mirofish-badge">
      <div id="mirofish-phase">MiroFish: Initializing…</div>
      <div id="mirofish-rounds"></div>
      <div id="mirofish-progress-bar">
        <div id="mirofish-progress-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Node click detail -->
    <div id="node-detail">
      <span id="node-detail-close" onclick="closeDetail()">×</span>
      <h3 id="detail-name">—</h3>
      <div id="detail-rows"></div>
    </div>
  </main>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-section">
      <div class="section-title">Metrics</div>
      <div class="metric-row">
        <span class="metric-label">Elapsed</span>
        <span class="metric-value" id="m-elapsed">—</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">Steps</span>
        <span class="metric-value" id="m-steps">—</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">Total Cost</span>
        <span class="metric-value yellow" id="m-cost">$0.0000</span>
      </div>
      <div class="metric-row">
        <span class="metric-label">Errors</span>
        <span class="metric-value" id="m-errors">0</span>
      </div>
      <div class="metric-row" id="m-runs-row" style="display:none">
        <span class="metric-label">Runs</span>
        <span class="metric-value" id="m-runs">0</span>
      </div>
      <div class="metric-row" id="m-wr-row" style="display:none">
        <span class="metric-label">Win Rate</span>
        <span class="metric-value green" id="m-winrate">N/A</span>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1; overflow-y:auto">
      <div class="section-title">Agents</div>
      <div id="agent-list"></div>
    </div>
  </aside>

  <!-- Log -->
  <div id="log-area">
    <div id="log-header">
      <span>Event Log</span>
      <span id="log-clear" onclick="clearLog()">clear</span>
    </div>
    <div id="log-entries"></div>
  </div>

</div>

<script>
// ================================================================= //
//  State                                                             //
// ================================================================= //

let state = { nodes: [], metrics: {}, mirofish: {} };
let network = null;
let visNodes = null;
let visEdges = null;
let miroNodes = [];       // IDs of MiroFish cluster nodes currently injected
let activeSimAgent = null;

const STATUS_COLORS = {
  waiting:  '#555566',
  active:   '#f5a623',
  complete: '#27ae60',
  error:    '#e74c3c',
  skipped:  '#888888',
};

const MIROFISH_CLUSTERS = [
  { id: 'mf_retail',  label: 'Retail\n35%',    size: 28, color: '#6c3483' },
  { id: 'mf_analyst', label: 'Analysts\n30%',  size: 24, color: '#7d3c98' },
  { id: 'mf_media',   label: 'Media\n20%',     size: 20, color: '#8e44ad' },
  { id: 'mf_inst',    label: 'Institutional\n15%', size: 16, color: '#9b59b6' },
];

const PHASE_LABELS = {
  graph_build: '⬡ Building Knowledge Graph',
  sim_running: '⚙ Running OASIS Simulation',
  report_gen:  '📄 Generating Report',
};

// ================================================================= //
//  vis.js Network                                                    //
// ================================================================= //

function initNetwork(nodes) {
  const container = document.getElementById('network');

  const nodeData = nodes.map((n, i) => ({
    id: n.name,
    label: n.name,
    title: n.role,
    color: {
      background: STATUS_COLORS[n.status] || '#555566',
      border: '#1a1a2e',
      highlight: { background: STATUS_COLORS[n.status], border: '#00d4ff' },
    },
    font: { color: '#eeeeff', size: 14, face: 'Fira Code, monospace' },
    shape: 'box',
    borderWidth: 2,
    borderWidthSelected: 3,
    margin: { top: 10, bottom: 10, left: 14, right: 14 },
    shadow: { enabled: true, color: 'rgba(0,0,0,0.5)', size: 10 },
  }));

  const edgeData = nodes.slice(0, -1).map((n, i) => ({
    from: n.name,
    to: nodes[i + 1].name,
    arrows: { to: { enabled: true, scaleFactor: 0.7 } },
    color: { color: '#2a2a40', highlight: '#00d4ff' },
    smooth: { type: 'curvedCW', roundness: 0.1 },
    width: 2,
  }));

  visNodes = new vis.DataSet(nodeData);
  visEdges = new vis.DataSet(edgeData);

  const options = {
    layout: {
      hierarchical: {
        enabled: true,
        direction: 'LR',
        sortMethod: 'directed',
        nodeSpacing: 160,
        levelSeparation: 180,
      },
    },
    physics: { enabled: false },
    interaction: {
      hover: true,
      tooltipDelay: 200,
      zoomView: true,
      dragView: true,
    },
    edges: {
      arrows: { to: { enabled: true } },
    },
    nodes: {
      chosen: true,
    },
  };

  network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, options);

  network.on('click', (params) => {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      const node = state.nodes.find(n => n.name === nodeId);
      if (node) showDetail(node);
    } else {
      closeDetail();
    }
  });

  // Fit after a moment
  setTimeout(() => network && network.fit({ animation: { duration: 600 } }), 300);
}

// ================================================================= //
//  Node updates                                                      //
// ================================================================= //

function updateNodeColor(name, status) {
  if (!visNodes) return;
  const color = STATUS_COLORS[status] || '#555566';
  visNodes.update({
    id: name,
    color: {
      background: color,
      border: status === 'active' ? '#f5a623' : '#1a1a2e',
      highlight: { background: color, border: '#00d4ff' },
    },
    borderWidth: status === 'active' ? 3 : 2,
    shadow: status === 'active'
      ? { enabled: true, color: 'rgba(245,166,35,0.4)', size: 18 }
      : { enabled: true, color: 'rgba(0,0,0,0.5)', size: 10 },
  });

  // Animate edge leading to this node green when complete
  if (status === 'complete') {
    const edge = visEdges.get().find(e => e.to === name);
    if (edge) visEdges.update({ id: edge.id, color: { color: '#27ae60' } });
  }
}

// ================================================================= //
//  MiroFish cluster injection                                        //
// ================================================================= //

function injectMiroFishClusters(anchorName, sentimentPct) {
  if (!visNodes || miroNodes.length > 0) return;
  activeSimAgent = anchorName;

  // Temporarily disable hierarchical layout to allow free positioning
  network.setOptions({ layout: { hierarchical: { enabled: false } }, physics: { enabled: true } });

  // Get anchor position
  const pos = network.getPosition(anchorName);

  const offsets = [
    { x: -160, y: -100 },
    { x:  160, y: -100 },
    { x: -160, y:  100 },
    { x:  160, y:  100 },
  ];

  MIROFISH_CLUSTERS.forEach((c, i) => {
    const bgColor = sentimentPct > 50
      ? adjustColor(c.color, 30, 'green')
      : adjustColor(c.color, 0, 'neutral');

    visNodes.add({
      id: c.id,
      label: c.label,
      x: pos.x + offsets[i].x,
      y: pos.y + offsets[i].y,
      size: c.size,
      color: { background: bgColor, border: '#9b59b6' },
      font: { color: '#ddd', size: 10 },
      shape: 'ellipse',
      physics: true,
      fixed: false,
    });

    // Edge from anchor to cluster
    visEdges.add({
      id: `mf_edge_${c.id}`,
      from: anchorName,
      to: c.id,
      color: { color: '#9b59b6', opacity: 0.6 },
      dashes: [4, 4],
      width: 1,
      arrows: { to: { enabled: false } },
    });

    // Edges between clusters (opinion propagation)
    if (i > 0) {
      visEdges.add({
        id: `mf_inter_${c.id}`,
        from: MIROFISH_CLUSTERS[i - 1].id,
        to: c.id,
        color: { color: '#7d3c98', opacity: 0.3 },
        dashes: [2, 6],
        width: 1,
        arrows: { to: { enabled: false } },
      });
    }

    miroNodes.push(c.id);
  });

  setTimeout(() => network && network.stabilize(50), 100);
}

function removeMiroFishClusters() {
  if (!visNodes || miroNodes.length === 0) return;

  visNodes.remove(miroNodes);
  visEdges.remove(miroNodes.map(id => `mf_edge_${id}`));
  visEdges.remove(MIROFISH_CLUSTERS.slice(1).map(c => `mf_inter_${c.id}`));
  miroNodes = [];
  activeSimAgent = null;

  // Restore hierarchical layout
  network.setOptions({
    layout: { hierarchical: { enabled: true, direction: 'LR', sortMethod: 'directed', nodeSpacing: 160, levelSeparation: 180 } },
    physics: { enabled: false },
  });
  setTimeout(() => network && network.fit({ animation: { duration: 400 } }), 200);
}

function updateClusterSentiment(pct) {
  if (miroNodes.length === 0) return;
  MIROFISH_CLUSTERS.forEach(c => {
    const bgColor = pct > 55
      ? '#1a6b3a'
      : pct < 45
        ? '#6b1a1a'
        : '#3a3a5c';
    visNodes.update({ id: c.id, color: { background: bgColor, border: '#9b59b6' } });
  });
}

function adjustColor(hex, adjust, mode) {
  if (mode === 'green') return '#1e5c3a';
  if (mode === 'red')   return '#5c1e1e';
  return hex;
}

// ================================================================= //
//  Sidebar agent list                                                //
// ================================================================= //

function renderAgentList() {
  const list = document.getElementById('agent-list');
  list.innerHTML = '';

  state.nodes.forEach(n => {
    const color = STATUS_COLORS[n.status] || '#555';
    const icons = { waiting: '⏸', active: '⚡', complete: '✓', error: '✗', skipped: '—' };
    const icon = icons[n.status] || '?';

    const div = document.createElement('div');
    div.className = 'agent-item';
    div.onclick = () => showDetail(n);

    div.innerHTML = `
      <div class="agent-dot" style="background:${color}"></div>
      <div style="flex:1; min-width:0">
        <div style="display:flex; justify-content:space-between; align-items:center">
          <span class="agent-name">${n.name}</span>
          <span class="agent-status-icon" style="color:${color}">${icon}</span>
        </div>
        <div class="agent-role">${n.role} ${n.status === 'active' ? '· ' + n.progress + '%' : n.duration !== '--:--' ? '· ' + n.duration : ''}</div>
        ${n.status === 'active' ? `
          <div class="agent-progress-wrap">
            <div class="agent-progress-bar">
              <div class="agent-progress-fill" style="width:${n.progress}%;background:${color}"></div>
            </div>
          </div>` : ''}
      </div>
    `;
    list.appendChild(div);
  });
}

// ================================================================= //
//  Node detail panel                                                 //
// ================================================================= //

function showDetail(node) {
  const panel = document.getElementById('node-detail');
  document.getElementById('detail-name').textContent = `${node.name} · ${node.role}`;

  const rows = document.getElementById('detail-rows');
  rows.innerHTML = '';

  const addRow = (key, val, valClass = '') => {
    const div = document.createElement('div');
    div.className = 'detail-row';
    div.innerHTML = `<span class="detail-key">${key}</span><span class="detail-val ${valClass}">${val}</span>`;
    rows.appendChild(div);
  };

  const statusColors = { complete: 'green', error: 'red', active: 'yellow' };
  addRow('Status',   node.status, statusColors[node.status] || '');
  addRow('Duration', node.duration || '--:--');
  if (node.cost_usd > 0) addRow('Cost', '$' + node.cost_usd.toFixed(4), 'yellow');
  if (node.error)        addRow('Error', node.error, 'red');

  if (node.output_data && Object.keys(node.output_data).length > 0) {
    const sep = document.createElement('div');
    sep.style.cssText = 'border-top:1px solid #2a2a40;margin:8px 0 6px;';
    rows.appendChild(sep);
    Object.entries(node.output_data).slice(0, 8).forEach(([k, v]) => {
      addRow(k, String(v).slice(0, 24));
    });
  }

  panel.classList.add('visible');
}

function closeDetail() {
  document.getElementById('node-detail').classList.remove('visible');
}

// ================================================================= //
//  Metrics panel                                                     //
// ================================================================= //

function updateMetrics(m) {
  document.getElementById('m-elapsed').textContent  = m.elapsed  || '—';
  document.getElementById('m-steps').textContent    = m.steps    || '—';
  document.getElementById('m-cost').textContent     = '$' + (m.total_cost || 0).toFixed(4);
  const errEl = document.getElementById('m-errors');
  errEl.textContent = m.error_count || 0;
  errEl.className = 'metric-value' + (m.error_count > 0 ? ' red' : '');

  if (m.run_count > 0) {
    document.getElementById('m-runs-row').style.display = 'flex';
    document.getElementById('m-wr-row').style.display   = 'flex';
    document.getElementById('m-runs').textContent    = m.run_count;
    document.getElementById('m-winrate').textContent = m.success_rate || 'N/A';
  }

  // Header badges
  document.getElementById('elapsed-badge').textContent = m.elapsed || '00:00:00';
  document.getElementById('steps-badge').textContent   = m.steps   || '0/?';
  document.getElementById('cost-badge').textContent    = '$' + (m.total_cost || 0).toFixed(4);
}

// ================================================================= //
//  Event log                                                         //
// ================================================================= //

let logCount = 0;

function addLog(eventName, data) {
  const container = document.getElementById('log-entries');
  const now = new Date();
  const ts = now.toTimeString().slice(0, 8);

  const typeClass = eventName.includes('start')    ? 'start'
                  : eventName.includes('complete')  ? 'complete'
                  : eventName.includes('error')     ? 'error'
                  : eventName.includes('mirofish')  ? 'mirofish'
                  : 'default';

  let msg = '';
  if (data.agent)        msg = data.agent;
  if (data.task)         msg += ` — ${data.task}`;
  if (data.error)        msg += ` — ${data.error}`;
  if (data.phase)        msg += ` — ${PHASE_LABELS[data.phase] || data.phase}`;
  if (data.pipeline_name) msg = data.pipeline_name;
  if (data.total_cost)   msg += ` — cost $${data.total_cost.toFixed(4)}`;

  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <span class="log-ts">${ts}</span>
    <span class="log-event ${typeClass}">${eventName}</span>
    <span class="log-msg">${msg}</span>
  `;
  container.appendChild(entry);
  container.scrollTop = container.scrollHeight;

  // Keep max 100 entries
  if (++logCount > 100) {
    container.removeChild(container.firstChild);
  }
}

function clearLog() {
  document.getElementById('log-entries').innerHTML = '';
  logCount = 0;
}

// ================================================================= //
//  Full state apply (from init / api/state)                         //
// ================================================================= //

function applyState(newState) {
  state = newState;

  // Pipeline name
  if (state.metrics) {
    document.getElementById('pipeline-name').textContent = '';
  }

  if (!network && state.nodes && state.nodes.length > 0) {
    initNetwork(state.nodes);
  } else if (network && state.nodes) {
    state.nodes.forEach(n => updateNodeColor(n.name, n.status));
  }

  if (state.metrics) updateMetrics(state.metrics);
  renderAgentList();
}

// ================================================================= //
//  WebSocket event handling                                          //
// ================================================================= //

function handleEvent(event, data) {
  addLog(event, data);

  switch (event) {
    case 'init':
      applyState(data);
      document.getElementById('live-dot').className = 'live';
      break;

    case 'pipeline_start':
      document.getElementById('pipeline-name').textContent = data.pipeline_name || '';
      document.getElementById('live-dot').className = 'live';
      document.getElementById('header').style.borderBottomColor = '#f5a623';
      // Reset node colors
      if (visNodes) {
        visNodes.get().forEach(n => {
          if (!n.id.startsWith('mf_')) {
            visNodes.update({ id: n.id, color: { background: STATUS_COLORS.waiting, border: '#1a1a2e' } });
          }
        });
      }
      break;

    case 'agent_start': {
      // Update state
      const n = state.nodes.find(x => x.name === data.agent);
      if (n) { n.status = 'active'; n.progress = 0; n.status_text = data.task || ''; }
      updateNodeColor(data.agent, 'active');
      renderAgentList();
      document.getElementById('active-label').textContent = `→ ${data.agent}`;
      break;
    }

    case 'agent_progress': {
      const n = state.nodes.find(x => x.name === data.agent);
      if (n) { n.progress = data.progress || 0; n.status_text = data.status_text || ''; }
      renderAgentList();
      break;
    }

    case 'agent_complete': {
      const n = state.nodes.find(x => x.name === data.agent);
      if (n) {
        n.status = 'complete';
        n.progress = 100;
        n.output_data = data.data || {};
        n.cost_usd = data.cost_usd || 0;
        n.duration = data.duration || '--:--';
      }
      updateNodeColor(data.agent, 'complete');
      removeMiroFishClusters();
      hideMiroFishBadge();
      renderAgentList();
      break;
    }

    case 'agent_error': {
      const n = state.nodes.find(x => x.name === data.agent);
      if (n) { n.status = 'error'; n.error = data.error; }
      updateNodeColor(data.agent, 'error');
      removeMiroFishClusters();
      hideMiroFishBadge();
      document.getElementById('live-dot').className = 'error';
      renderAgentList();
      break;
    }

    case 'pipeline_complete': {
      document.getElementById('live-dot').className = data.approved ? 'live' : 'error';
      document.getElementById('active-label').textContent = data.approved ? '✓ Approved' : '✗ Rejected';
      document.getElementById('header').style.borderBottomColor = data.approved ? '#27ae60' : '#e74c3c';
      break;
    }

    case 'mirofish_update':
      handleMiroFishUpdate(data);
      break;
  }

  // Sync metrics on any event that carries them
  if (state.metrics) updateMetrics(state.metrics);
}

function handleMiroFishUpdate(data) {
  const badge  = document.getElementById('mirofish-badge');
  const phase  = data.phase || 'sim_running';
  const pct    = data.progress_percent || 0;
  const cr     = data.current_round || 0;
  const tr     = data.total_rounds || 0;

  // Badge
  document.getElementById('mirofish-phase').textContent   = PHASE_LABELS[phase] || phase;
  document.getElementById('mirofish-rounds').textContent  = tr > 0 ? `Round ${cr} / ${tr}` : '';
  document.getElementById('mirofish-progress-fill').style.width = pct + '%';
  badge.classList.add('visible');

  // Inject cluster nodes around the active simulation agent
  if (activeSimAgent === null && state.nodes) {
    const simNode = state.nodes.find(n => n.status === 'active');
    if (simNode) injectMiroFishClusters(simNode.name, pct);
  }

  // Update cluster sentiment color based on progress
  updateClusterSentiment(pct);
}

function hideMiroFishBadge() {
  document.getElementById('mirofish-badge').classList.remove('visible');
}

// ================================================================= //
//  Metrics ticker (updates elapsed every second)                    //
// ================================================================= //

let metricsInterval = null;

function startMetricsTicker() {
  if (metricsInterval) return;
  let secs = 0;
  metricsInterval = setInterval(() => {
    secs++;
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    const str = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    document.getElementById('m-elapsed').textContent = str;
    document.getElementById('elapsed-badge').textContent = str;
  }, 1000);
}

// ================================================================= //
//  WebSocket connection                                              //
// ================================================================= //

function connect() {
  const ws = new WebSocket(`ws://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('live-dot').classList.add('live');
    startMetricsTicker();
    addLog('ws_connect', { agent: 'Dashboard connected' });
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleEvent(msg.event, msg.data || {});
    } catch (_) {}
  };

  ws.onerror = () => {
    document.getElementById('live-dot').className = '';
  };

  ws.onclose = () => {
    document.getElementById('live-dot').className = '';
    addLog('ws_disconnect', { agent: 'Reconnecting in 3s…' });
    setTimeout(connect, 3000);
  };
}

// ================================================================= //
//  Bootstrap                                                         //
// ================================================================= //

(async function init() {
  // Try to load current state from REST before WS connects
  try {
    const res = await fetch('/api/state');
    if (res.ok) {
      const data = await res.json();
      applyState(data);
      if (data.nodes && data.nodes.length > 0) {
        document.getElementById('pipeline-name').textContent =
          data.nodes.map(n => n.name).join(' → ');
      }
    }
  } catch (_) {}

  connect();
})();
</script>
